<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum Library</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header>
    <h1>Curriculum Library</h1>
    <p>Browse and filter open-source curriculum materials</p>
  </header>
  <main>
    <input type="text" name="name" id="name" placeholder="Search" />
    <select name="grade" id="grade" placeholder="Grade Level">
    </select>
    <select name="topic" id="topic" placeholder="Topic">
    </select>
  </main>
  <footer>
    <p>Open source — <a href="https://github.com/silkworm024/sdst-library">View on GitHub</a></p>
  </footer>
</body>
</html>
